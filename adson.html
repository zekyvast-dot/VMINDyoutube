<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub Admin - Manage Games</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAnalytics } from "firebase/analytics";
        
        // ═══════════════════════════════════════
        // KONFIGURASI & KEAMANAN
        // ═══════════════════════════════════════
        const ADMIN_PASSWORD = "Sona123"; // Ganti password di sini
        
        // Cek password saat load
        (function checkAuth() {
            const stored = sessionStorage.getItem('gh_admin_auth');
            if (stored !== 'true') {
                const input = prompt('🔐 Masukkan password admin:');
                if (input !== ADMIN_PASSWORD) {
                    alert('❌ Password salah! Akses ditolak.');
                    window.location.href = 'about:blank';
                    throw new Error('Unauthorized');
                }
                sessionStorage.setItem('gh_admin_auth', 'true');
            }
        })();

        // ═══════════════════════════════════════
        // FIREBASE CONFIG
        // ═══════════════════════════════════════
// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDmCK1QNKyCWVavGkiOuPIdBQgAEyT2AhU",
  authDomain: "gamehub-bb234.firebaseapp.com",
  projectId: "gamehub-bb234",
  storageBucket: "gamehub-bb234.firebasestorage.app",
  messagingSenderId: "86911499014",
  appId: "1:86911499014:web:fea722a919893aea2e7c87",
  measurementId: "G-WXWP4HHQZR"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gamesCol = collection(db, "games");

        // ═══════════════════════════════════════
        // ADMIN DASHBOARD CLASS
        // ═══════════════════════════════════════
        class AdminDashboard {
            constructor() {
                this.editingId = null;
                this.games = [];
                
                this.cacheDOM();
                this.bindEvents();
                this.loadGames();
            }

            cacheDOM() {
                // Form elements
                this.form = document.getElementById('gameForm');
                this.formTitle = document.getElementById('formTitle');
                this.submitBtn = document.getElementById('submitBtn');
                this.btnText = document.getElementById('btnText');
                this.btnIcon = document.getElementById('btnIcon');
                this.cancelBtn = document.getElementById('cancelBtn');
                
                // Inputs
                this.nameInput = document.getElementById('name');
                this.descInput = document.getElementById('description');
                this.linkInput = document.getElementById('link');
                this.imageInput = document.getElementById('image');
                this.ratingInput = document.getElementById('rating');
                
                // Preview
                this.previewBox = document.getElementById('previewBox');
                this.previewImg = document.getElementById('previewImg');
                this.previewPlaceholder = document.getElementById('previewPlaceholder');
                
                // List
                this.gamesList = document.getElementById('gamesList');
                this.loader = document.getElementById('loader');
                this.emptyState = document.getElementById('emptyState');
                this.gameCount = document.getElementById('gameCount');
                
                // Toast
                this.toast = document.getElementById('toast');
                this.toastIcon = document.getElementById('toastIcon');
                this.toastMsg = document.getElementById('toastMsg');
            }

            bindEvents() {
                // Form submit
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                
                // Cancel edit
                this.cancelBtn.addEventListener('click', () => this.resetForm());
                
                // Image preview
                this.imageInput.addEventListener('input', () => this.updatePreview());
                
                // Rating stars click
                document.querySelectorAll('.star-input').forEach((star, idx) => {
                    star.addEventListener('click', () => this.setRating(idx + 1));
                });
            }

            // ═══════════════════════════════════════
            // IMAGE PREVIEW
            // ═══════════════════════════════════════
            updatePreview() {
                const url = this.imageInput.value.trim();
                if (url && this.isValidUrl(url)) {
                    this.previewImg.src = url;
                    this.previewImg.style.display = 'block';
                    this.previewPlaceholder.style.display = 'none';
                    this.previewImg.onerror = () => {
                        this.previewImg.style.display = 'none';
                        this.previewPlaceholder.style.display = 'flex';
                        this.previewPlaceholder.innerHTML = '<i class="fas fa-image"></i><span>Invalid URL</span>';
                    };
                } else {
                    this.previewImg.style.display = 'none';
                    this.previewPlaceholder.style.display = 'flex';
                    this.previewPlaceholder.innerHTML = '<i class="fas fa-image"></i><span>Preview</span>';
                }
            }

            isValidUrl(string) {
                try { new URL(string); return true; } catch { return false; }
            }

            // ═══════════════════════════════════════
            // RATING
            // ═══════════════════════════════════════
            setRating(value) {
                this.ratingInput.value = value;
                document.querySelectorAll('.star-input').forEach((star, idx) => {
                    star.classList.toggle('active', idx < value);
                });
                document.getElementById('ratingValue').textContent = value;
            }

            getRating() {
                return parseFloat(this.ratingInput.value) || 0;
            }

            // ═══════════════════════════════════════
            // CRUD OPERATIONS
            // ═══════════════════════════════════════
            async handleSubmit(e) {
                e.preventDefault();
                
                const data = {
                    name: this.nameInput.value.trim(),
                    description: this.descInput.value.trim(),
                    link: this.linkInput.value.trim(),
                    image: this.imageInput.value.trim(),
                    rating: this.getRating()
                };

                // Validasi
                if (!data.name || !data.description || !data.link || !data.image || !data.rating) {
                    this.showToast('error', 'Semua field wajib diisi!');
                    return;
                }

                this.setLoading(true);

                try {
                    if (this.editingId) {
                        // UPDATE
                        await updateDoc(doc(db, "games", this.editingId), data);
                        this.showToast('success', 'Game berhasil diupdate!');
                    } else {
                        // CREATE
                        await addDoc(gamesCol, data);
                        this.showToast('success', 'Game berhasil ditambahkan!');
                    }
                    
                    this.resetForm();
                    await this.loadGames();
                    
                } catch (err) {
                    console.error(err);
                    this.showToast('error', 'Terjadi kesalahan. Cek konsol.');
                } finally {
                    this.setLoading(false);
                }
            }

            async loadGames() {
                this.loader.style.display = 'flex';
                this.gamesList.style.display = 'none';
                this.emptyState.style.display = 'none';

                try {
                    const snapshot = await getDocs(gamesCol);
                    this.games = [];
                    snapshot.forEach(docSnap => {
                        this.games.push({ id: docSnap.id, ...docSnap.data() });
                    });

                    this.renderGames();
                    this.gameCount.textContent = `${this.games.length} game`;
                    
                } catch (err) {
                    console.error(err);
                    this.showToast('error', 'Gagal memuat data');
                } finally {
                    this.loader.style.display = 'none';
                }
            }

            async deleteGame(id, name) {
                if (!confirm(`Hapus game "${name}"?\n\nTindakan ini tidak bisa dibatalkan.`)) return;
                
                try {
                    await deleteDoc(doc(db, "games", id));
                    this.showToast('success', `"${name}" berhasil dihapus!`);
                    await this.loadGames();
                } catch (err) {
                    console.error(err);
                    this.showToast('error', 'Gagal menghapus game');
                }
            }

            editGame(game) {
                this.editingId = game.id;
                
                // Isi form
                this.nameInput.value = game.name;
                this.descInput.value = game.description;
                this.linkInput.value = game.link;
                this.imageInput.value = game.image;
                this.setRating(game.rating || 0);
                this.updatePreview();
                
                // Ubah UI ke mode edit
                this.formTitle.innerHTML = '<i class="fas fa-edit"></i> Edit Game';
                this.btnText.textContent = 'Update Game';
                this.btnIcon.className = 'fas fa-save';
                this.submitBtn.classList.add('edit-mode');
                this.cancelBtn.style.display = 'inline-flex';
                
                // Scroll ke form
                this.form.scrollIntoView({ behavior: 'smooth', block: 'start' });
                this.nameInput.focus();
            }

            // ═══════════════════════════════════════
            // UI HELPERS
            // ═══════════════════════════════════════
            resetForm() {
                this.form.reset();
                this.editingId = null;
                this.setRating(0);
                this.updatePreview();
                
                this.formTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Tambah Game Baru';
                this.btnText.textContent = 'Tambah Game';
                this.btnIcon.className = 'fas fa-plus';
                this.submitBtn.classList.remove('edit-mode');
                this.cancelBtn.style.display = 'none';
            }

            setLoading(loading) {
                this.submitBtn.disabled = loading;
                this.submitBtn.style.opacity = loading ? '0.7' : '1';
                this.btnText.textContent = loading ? 'Memproses...' : (this.editingId ? 'Update Game' : 'Tambah Game');
            }

            renderGames() {
                if (this.games.length === 0) {
                    this.gamesList.style.display = 'none';
                    this.emptyState.style.display = 'flex';
                    return;
                }

                this.gamesList.style.display = 'grid';
                this.emptyState.style.display = 'none';

                this.gamesList.innerHTML = this.games.map((game, idx) => `
                    <div class="admin-card" style="animation-delay: ${idx * 0.05}s">
                        <div class="card-thumb">
                            <img src="${game.image}" alt="${game.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/120x120/1a1a1a/FFD700?text=No+Image'">
                        </div>
                        <div class="card-body">
                            <h3 class="card-name">${game.name}</h3>
                            <p class="card-desc">${game.description}</p>
                            <div class="card-meta">
                                <div class="card-rating">
                                    ${this.renderStars(game.rating)}
                                    <span>${game.rating?.toFixed(1) || '0.0'}</span>
                                </div>
                                <a href="${game.link}" target="_blank" class="card-link" onclick="event.stopPropagation()">
                                    <i class="fas fa-external-link-alt"></i> Safelinku
                                </a>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-action btn-edit" onclick="admin.editGame(${JSON.stringify(game).replace(/"/g, '&quot;')})">
                                <i class="fas fa-pen"></i>
                                <span>Edit</span>
                            </button>
                            <button class="btn-action btn-delete" onclick="admin.deleteGame('${game.id}', '${game.name.replace(/'/g, "\\'")}')">
                                <i class="fas fa-trash"></i>
                                <span>Hapus</span>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            renderStars(rating) {
                let html = '';
                for (let i = 1; i <= 5; i++) {
                    if (i <= rating) html += '<i class="fas fa-star"></i>';
                    else if (i - 0.5 <= rating) html += '<i class="fas fa-star-half-alt"></i>';
                    else html += '<i class="far fa-star"></i>';
                }
                return html;
            }

            showToast(type, message) {
                this.toast.className = `toast show ${type}`;
                this.toastIcon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
                this.toastMsg.textContent = message;
                
                setTimeout(() => {
                    this.toast.classList.remove('show');
                }, 3000);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            window.admin = new AdminDashboard();
        });
    </script>

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --bg-input: #1a1a1a;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --gold: #FFD700;
            --gold-dark: #D4AF37;
            --gold-light: #FFE55C;
            --gold-glow: rgba(255, 215, 0, 0.15);
            --gold-transparent: rgba(255, 215, 0, 0.1);
            --danger: #ff4757;
            --danger-hover: #ff6b81;
            --success: #2ed573;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER */
        .admin-header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            max-width: 1200px; margin: 0 auto;
            padding: 1rem 2rem; display: flex;
            align-items: center; justify-content: space-between;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 1.2rem;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .logo-text {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-badge {
            background: var(--gold-transparent);
            border: 1px solid var(--gold-dark);
            color: var(--gold); padding: 6px 16px;
            border-radius: 100px; font-size: 0.8rem;
            font-weight: 600; display: flex;
            align-items: center; gap: 6px;
        }

        /* MAIN */
        .admin-main {
            max-width: 1200px; margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
        }

        /* FORM SECTION */
        .form-section {
            position: sticky; top: 90px;
            height: fit-content;
        }
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .section-title {
            font-size: 1.1rem; font-weight: 700;
            margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: var(--gold); }

        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block; font-size: 0.85rem;
            font-weight: 500; color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-label span { color: var(--danger); }

        .form-input, .form-textarea {
            width: 100%; padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit; font-size: 0.9rem;
            transition: var(--transition); outline: none;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .form-textarea {
            resize: vertical; min-height: 80px;
        }

        /* Rating Input */
        .rating-input-group {
            display: flex; align-items: center; gap: 4px;
        }
        .star-input {
            font-size: 1.5rem; color: var(--border-hover);
            cursor: pointer; transition: var(--transition);
            background: none; border: none; padding: 2px;
        }
        .star-input:hover, .star-input.active {
            color: var(--gold);
            transform: scale(1.1);
        }
        .rating-value {
            margin-left: 10px; color: var(--gold);
            font-weight: 700; font-size: 0.9rem;
            min-width: 24px;
        }

        /* Image Preview */
        .preview-box {
            width: 100%; aspect-ratio: 16/9;
            background: var(--bg-input);
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            margin-top: 8px;
        }
        .preview-placeholder {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px;
            color: var(--text-muted); font-size: 0.85rem;
        }
        .preview-placeholder i { font-size: 2rem; }
        .preview-img {
            width: 100%; height: 100%;
            object-fit: cover; display: none;
        }

        /* Buttons */
        .form-actions {
            display: flex; gap: 10px; margin-top: 1.25rem;
        }
        .btn-primary {
            flex: 1; padding: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000; border: none; border-radius: var(--radius-sm);
            font-family: inherit; font-weight: 700;
            font-size: 0.9rem; cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        .btn-primary.edit-mode {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .btn-secondary {
            padding: 12px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            font-family: inherit; font-weight: 600;
            font-size: 0.9rem; cursor: pointer;
            transition: var(--transition);
            display: none;
            align-items: center; gap: 6px;
        }
        .btn-secondary:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* LIST SECTION */
        .list-section { min-width: 0; }
        .list-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 1.25rem;
        }
        .list-title {
            font-size: 1.1rem; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .list-title i { color: var(--gold); }
        .count-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 12px; border-radius: 100px;
            font-size: 0.8rem; font-weight: 600;
        }

        /* Loader */
        .loader-box {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 4rem 2rem; gap: 1rem;
        }
        .loader-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-box {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 4rem 2rem; gap: 1rem;
            text-align: center;
        }
        .empty-box i { font-size: 3rem; color: var(--border-hover); }
        .empty-box h3 { color: var(--text-secondary); font-size: 1.1rem; }
        .empty-box p { color: var(--text-muted); font-size: 0.9rem; }

        /* Games Grid */
        .games-list {
            display: grid; gap: 1rem;
        }
        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 1rem; align-items: start;
            opacity: 0; animation: fadeInUp 0.4s ease forwards;
            transition: var(--transition);
        }
        .admin-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-thumb {
            width: 80px; height: 80px;
            border-radius: var(--radius-sm);
            overflow: hidden; flex-shrink: 0;
        }
        .card-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .card-body { min-width: 0; }
        .card-name {
            font-size: 1rem; font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-desc {
            font-size: 0.85rem; color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 8px;
        }
        .card-meta {
            display: flex; align-items: center;
            gap: 1rem; flex-wrap: wrap;
        }
        .card-rating {
            display: flex; align-items: center;
            gap: 4px; color: var(--gold);
            font-size: 0.85rem; font-weight: 600;
        }
        .card-link {
            color: var(--text-muted); text-decoration: none;
            font-size: 0.8rem; display: flex;
            align-items: center; gap: 4px;
            transition: var(--transition);
        }
        .card-link:hover { color: var(--gold); }
        .card-actions {
            display: flex; flex-direction: column;
            gap: 6px;
        }
        .btn-action {
            padding: 8px 14px; border-radius: var(--radius-sm);
            font-family: inherit; font-size: 0.8rem;
            font-weight: 600; cursor: pointer;
            transition: var(--transition); border: none;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-edit {
            background: var(--gold-transparent);
            color: var(--gold); border: 1px solid var(--gold-dark);
        }
        .btn-edit:hover {
            background: var(--gold); color: #000;
        }
        .btn-delete {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .btn-delete:hover {
            background: var(--danger); color: #fff;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            padding: 1rem 1.5rem; border-radius: var(--radius-sm);
            display: flex; align-items: center; gap: 12px;
            font-weight: 500; font-size: 0.9rem;
            transform: translateX(150%); opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 9999; box-shadow: var(--shadow);
            border: 1px solid;
        }
        .toast.show {
            transform: translateX(0); opacity: 1;
        }
        .toast.success {
            background: rgba(46, 213, 115, 0.1);
            border-color: var(--success); color: var(--success);
        }
        .toast.error {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--danger); color: var(--danger);
        }
        .toast i { font-size: 1.2rem; }

        /* RESPONSIVE */
        @media (max-width: 968px) {
            .admin-main {
                grid-template-columns: 1fr;
            }
            .form-section {
                position: static;
            }
        }
        @media (max-width: 640px) {
            .header-content { padding: 1rem; }
            .admin-main { padding: 1rem; gap: 1.5rem; }
            .admin-card {
                grid-template-columns: 60px 1fr;
                grid-template-rows: auto auto;
            }
            .card-thumb { width: 60px; height: 60px; }
            .card-actions {
                grid-column: 1 / -1;
                flex-direction: row;
            }
            .btn-action { flex: 1; justify-content: center; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 100px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="admin-header">
        <div class="header-content">
            <a href="#" class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <span class="logo-text">GameHub</span>
            </a>
            <div class="header-badge">
                <i class="fas fa-shield-alt"></i> Admin Panel
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="admin-main">

        <!-- FORM SECTION -->
        <aside class="form-section">
            <div class="section-card">
                <h2 class="section-title" id="formTitle">
                    <i class="fas fa-plus-circle"></i> Tambah Game Baru
                </h2>
                
                <form id="gameForm">
                    <div class="form-group">
                        <label class="form-label">Nama Game <span>*</span></label>
                        <input type="text" id="name" class="form-input" placeholder="Contoh: Mobile Legends" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Deskripsi <span>*</span></label>
                        <textarea id="description" class="form-textarea" placeholder="Deskripsi singkat game..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Link Safelinku <span>*</span></label>
                        <input type="url" id="link" class="form-input" placeholder="https://safelinku.com/..." required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">URL Gambar Thumbnail <span>*</span></label>
                        <input type="url" id="image" class="form-input" placeholder="https://example.com/image.jpg" required>
                        <div class="preview-box" id="previewBox">
                            <div class="preview-placeholder" id="previewPlaceholder">
                                <i class="fas fa-image"></i>
                                <span>Preview</span>
                            </div>
                            <img src="" alt="Preview" class="preview-img" id="previewImg">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Rating <span>*</span></label>
                        <div class="rating-input-group">
                            <button type="button" class="star-input" data-value="1"><i class="fas fa-star"></i></button>
                            <button type="button" class="star-input" data-value="2"><i class="fas fa-star"></i></button>
                            <button type="button" class="star-input" data-value="3"><i class="fas fa-star"></i></button>
                            <button type="button" class="star-input" data-value="4"><i class="fas fa-star"></i></button>
                            <button type="button" class="star-input" data-value="5"><i class="fas fa-star"></i></button>
                            <span class="rating-value" id="ratingValue">0</span>
                        </div>
                        <input type="hidden" id="rating" value="0">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <i class="fas fa-plus" id="btnIcon"></i>
                            <span id="btnText">Tambah Game</span>
                        </button>
                        <button type="button" class="btn-secondary" id="cancelBtn">
                            <i class="fas fa-times"></i> Batal
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        <!-- LIST SECTION -->
        <section class="list-section">
            <div class="list-header">
                <h2 class="list-title">
                    <i class="fas fa-list"></i> Daftar Game
                </h2>
                <span class="count-badge" id="gameCount">0 game</span>
            </div>

            <div class="loader-box" id="loader">
                <div class="loader-spinner"></div>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Memuat data...</span>
            </div>

            <div class="empty-box" id="emptyState">
                <i class="fas fa-box-open"></i>
                <h3>Belum ada game</h3>
                <p>Tambah game baru menggunakan form di samping.</p>
            </div>

            <div class="games-list" id="gamesList"></div>
        </section>

    </main>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i id="toastIcon"></i>
        <span id="toastMsg"></span>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Platform Download Game nomor 1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        class GameHub {
            constructor() {
                this.games = [];
                this.filteredGames = [];
                this.currentPage = 1;
                this.itemsPerPage = 8;
                this.currentView = 'home';
                
                this.cacheDOM();
                this.initRouter();
                this.init();
            }

            cacheDOM() {
                this.grid = document.getElementById('gamesGrid');
                this.searchInput = document.getElementById('searchInput');
                this.loader = document.getElementById('loader');
                this.emptyState = document.getElementById('emptyState');
                this.pagination = document.getElementById('pagination');
                this.pageInfo = document.getElementById('pageInfo');
                this.perPageSelect = document.getElementById('perPage');
                this.homeView = document.getElementById('homeView');
                this.detailView = document.getElementById('detailView');
                this.detailContent = document.getElementById('detailContent');
                this.backBtn = document.getElementById('backBtn');
            }

            initRouter() {
                window.addEventListener('hashchange', () => this.handleRoute());
                this.backBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.history.back();
                });
            }

            handleRoute() {
                const hash = window.location.hash;
                if (hash.startsWith('#game/')) {
                    const gameSlug = hash.replace('#game/', '');
                    this.showDetail(gameSlug);
                } else {
                    this.showHome();
                }
            }

            showHome() {
                this.currentView = 'home';
                this.homeView.style.display = 'block';
                this.detailView.style.display = 'none';
                document.title = 'GameHub - Platform Download Game';
                window.scrollTo(0, 0);
            }

            showDetail(slug) {
                const game = this.games.find(g => this.slugify(g.name) === slug);
                if (!game) {
                    window.location.hash = '';
                    return;
                }

                this.currentView = 'detail';
                this.homeView.style.display = 'none';
                this.detailView.style.display = 'block';
                
                // Find related games (same rating range or random)
                const related = this.games
                    .filter(g => g.id !== game.id)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 4);

                this.detailContent.innerHTML = `
                    <div class="detail-hero">
                        <div class="detail-image-wrapper">
                            <img src="${game.image}" alt="${game.name}" class="detail-image">
                            <div class="detail-badge">FREE DOWNLOAD</div>
                        </div>
                        <div class="detail-info">
                            <h1 class="detail-title">${game.name}</h1>
                            <div class="detail-rating">
                                <div class="stars large">${this.generateStars(game.rating)}</div>
                                <span class="rating-number">${game.rating.toFixed(1)}</span>
                                <span class="rating-count">• ${Math.floor(Math.random() * 500 + 50)} reviews</span>
                            </div>
                            <div class="detail-meta">
                                <div class="meta-item">
                                    <i class="fas fa-download"></i>
                                    <span>${Math.floor(Math.random() * 900 + 100)}K+ downloads</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-shield-alt"></i>
                                    <span>Verified Safe</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-file-archive"></i>
                                    <span>APK File</span>
                                </div>
                            </div>
                            <p class="detail-description">${game.description}</p>
                            <div class="detail-actions">
                                <a href="${game.link}" target="_blank" rel="noopener noreferrer" class="btn-download-large">
                                    <i class="fas fa-download"></i>
                                    <div class="btn-text">
                                        <span class="btn-label">Download Now</span>
                                        <span class="btn-sublabel">via Safelinku</span>
                                    </div>
                                </a>
                                <button class="btn-share" onclick="navigator.share?.({title:'${game.name}',url:location.href}) || alert('Link copied!')">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h2 class="section-heading"><i class="fas fa-info-circle"></i> About This Game</h2>
                        <div class="about-grid">
                            <div class="about-card">
                                <i class="fas fa-star"></i>
                                <span class="about-label">Rating</span>
                                <span class="about-value">${game.rating}/5.0</span>
                            </div>
                            <div class="about-card">
                                <i class="fas fa-weight-hanging"></i>
                                <span class="about-label">Size</span>
                                <span class="about-value">${(Math.random() * 900 + 50).toFixed(1)} MB</span>
                            </div>
                            <div class="about-card">
                                <i class="fas fa-code-branch"></i>
                                <span class="about-label">Version</span>
                                <span class="about-value">${Math.floor(Math.random() * 5 + 1)}.${Math.floor(Math.random() * 9)}.${Math.floor(Math.random() * 9)}</span>
                            </div>
                            <div class="about-card">
                                <i class="fas fa-android"></i>
                                <span class="about-label">Android</span>
                                <span class="about-value">5.0+</span>
                            </div>
                        </div>
                    </div>

                    ${related.length > 0 ? `
                    <div class="detail-section">
                        <h2 class="section-heading"><i class="fas fa-fire"></i> You Might Also Like</h2>
                        <div class="related-grid">
                            ${related.map((g, i) => `
                                <a href="#game/${this.slugify(g.name)}" class="related-card" style="animation-delay:${i * 0.1}s">
                                    <img src="${g.image}" alt="${g.name}">
                                    <div class="related-info">
                                        <h4>${g.name}</h4>
                                        <div class="related-rating">
                                            <i class="fas fa-star"></i>
                                            <span>${g.rating.toFixed(1)}</span>
                                        </div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                `;

                document.title = `${game.name} - Download | GameHub`;
                window.scrollTo(0, 0);
            }

            slugify(text) {
                return text.toLowerCase()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .trim();
            }

            async init() {
                this.showLoader();
                await this.fetchGames();
                this.setupSearch();
                this.setupPerPage();
                this.handleRoute();
                this.hideLoader();
            }

            showLoader() {
                this.loader.style.display = 'flex';
                this.homeView.style.display = 'none';
                this.detailView.style.display = 'none';
            }

            hideLoader() {
                this.loader.style.display = 'none';
                if (this.currentView === 'detail') {
                    this.homeView.style.display = 'none';
                    this.detailView.style.display = 'block';
                } else {
                    this.homeView.style.display = 'block';
                    this.detailView.style.display = 'none';
                }
            }

            async fetchGames() {
                try {
                    const querySnapshot = await getDocs(collection(db, "games"));
                    this.games = [];
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        
                        if (!data.link) return;
                        
                        this.games.push({
                            id: doc.id,
                            name: data.name || "Unnamed Game",
                            description: data.description || "Tidak ada deskripsi",
                            image: data.image || "https://via.placeholder.com/400x240/1a1a1a/FFD700?text=GameHub",
                            rating: Math.min(Math.max(data.rating || 0, 0), 5),
                            link: data.link || "#"
                        });
                    });
                    this.filteredGames = [...this.games];
                    this.currentPage = 1;
                    this.renderGames();
                } catch (error) {
                    console.error("Error:", error);
                    this.showEmpty("Gagal memuat data. Cek konfigurasi Firebase.");
                }
            }

            setupSearch() {
                let debounceTimer;
                this.searchInput.addEventListener('input', (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => this.filterGames(e.target.value), 300);
                });
            }

            setupPerPage() {
                this.perPageSelect.addEventListener('change', (e) => {
                    this.itemsPerPage = parseInt(e.target.value);
                    this.currentPage = 1;
                    this.renderGames();
                });
            }

            filterGames(query) {
                const searchTerm = query.toLowerCase().trim();
                this.filteredGames = searchTerm 
                    ? this.games.filter(g => g.name.toLowerCase().includes(searchTerm))
                    : [...this.games];
                this.currentPage = 1;
                this.renderGames();
            }

            getTotalPages() {
                return Math.ceil(this.filteredGames.length / this.itemsPerPage);
            }

            getPaginatedGames() {
                const start = (this.currentPage - 1) * this.itemsPerPage;
                return this.filteredGames.slice(start, start + this.itemsPerPage);
            }

            goToPage(page) {
                const total = this.getTotalPages();
                if (page < 1 || page > total) return;
                this.currentPage = page;
                this.renderGames();
                document.getElementById('gamesGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            generateStars(rating) {
    let stars = '';
    for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(rating)) stars += '<i class="fas fa-star star-filled"></i>';
        else if (i - 0.5 <= rating) stars += '<i class="fas fa-star-half-alt star-filled"></i>';
        else stars += '<i class="far fa-star star-empty"></i>';
    }
    return stars;
}

            renderPagination() {
                const totalPages = this.getTotalPages();
                const current = this.currentPage;
                
                if (totalPages <= 1) {
                    this.pagination.style.display = 'none';
                    return;
                }
                
                this.pagination.style.display = 'flex';
                let pages = [1];
                let startPage = Math.max(2, current - 1);
                let endPage = Math.min(totalPages - 1, current + 1);
                
                if (startPage > 2) pages.push('...');
                for (let i = startPage; i <= endPage; i++) pages.push(i);
                if (endPage < totalPages - 1) pages.push('...');
                if (totalPages > 1) pages.push(totalPages);

                let html = `
                    <button class="page-btn nav-btn ${current === 1 ? 'disabled' : ''}" 
                            onclick="window.gameHub.goToPage(${current - 1})" ${current === 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i>
                    </button>
                `;
                
                pages.forEach(page => {
                    if (page === '...') {
                        html += `<span class="page-dots">...</span>`;
                    } else {
                        html += `
                            <button class="page-btn ${page === current ? 'active' : ''}" 
                                    onclick="window.gameHub.goToPage(${page})">${page}</button>
                        `;
                    }
                });
                
                html += `
                    <button class="page-btn nav-btn ${current === totalPages ? 'disabled' : ''}" 
                            onclick="window.gameHub.goToPage(${current + 1})" ${current === totalPages ? 'disabled' : ''}>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                `;
                
                this.pagination.innerHTML = html;
                
                const start = (current - 1) * this.itemsPerPage + 1;
                const end = Math.min(current * this.itemsPerPage, this.filteredGames.length);
                this.pageInfo.textContent = `Menampilkan ${start}-${end} dari ${this.filteredGames.length} game`;
            }

            renderGames() {
                if (this.filteredGames.length === 0) {
                    this.grid.style.display = 'none';
                    this.emptyState.style.display = 'flex';
                    this.pagination.style.display = 'none';
                    this.pageInfo.textContent = '';
                    return;
                }

                this.grid.style.display = 'grid';
                this.emptyState.style.display = 'none';
                const paginatedGames = this.getPaginatedGames();
                
                this.grid.innerHTML = paginatedGames.map((game, index) => `
                    <article class="game-card" style="animation-delay: ${index * 0.05}s">
                        <a href="#game/${this.slugify(game.name)}" class="card-link">
                            <div class="card-image">
                                <img src="${game.image}" alt="${game.name}" loading="lazy">
                                <div class="card-overlay">
                                    <span class="badge">FREE</span>
                                </div>
                                <div class="card-hover-icon">
                                    <i class="fas fa-eye"></i>
                                </div>
                            </div>
                        </a>
                        <div class="card-content">
                            <a href="#game/${this.slugify(game.name)}" class="card-title-link">
                                <h3 class="game-title">${game.name}</h3>
                            </a>
                            <p class="game-desc">${game.description}</p>
                            <div class="game-rating">
                                <div class="stars">${this.generateStars(game.rating)}</div>
                                <span class="rating-text">${game.rating.toFixed(1)}</span>
                            </div>
                            <a href="${game.link}" target="_blank" rel="noopener noreferrer" class="download-btn" onclick="event.stopPropagation()">
                                <i class="fas fa-download"></i>
                                <span>Download</span>
                            </a>
                        </div>
                    </article>
                `).join('');
                
                this.renderPagination();
            }

            showEmpty(message = "Belum ada game tersedia") {
                this.loader.style.display = 'none';
                this.grid.style.display = 'none';
                this.pagination.style.display = 'none';
                this.pageInfo.textContent = '';
                this.emptyState.style.display = 'flex';
                this.emptyState.querySelector('p').textContent = message;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.gameHub = new GameHub();
        });
    </script>

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --bg-card-hover: #1c1c1c;
            --bg-elevated: #1a1a1a;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --gold: #FFD700;
            --gold-dark: #D4AF37;
            --gold-light: #FFE55C;
            --gold-glow: rgba(255, 215, 0, 0.15);
            --gold-transparent: rgba(255, 215, 0, 0.1);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 4px 30px rgba(255, 215, 0, 0.1);
            --shadow-hover: 0 8px 40px rgba(0, 0, 0, 0.7);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* LOADER */
        .loader-container {
            position: fixed; inset: 0; background: var(--bg-primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 20px;
        }
        .loader-spinner {
            width: 60px; height: 60px; border: 3px solid var(--border);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-text {
            color: var(--text-secondary); font-size: 0.95rem;
            letter-spacing: 2px; text-transform: uppercase;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            padding: 1rem 2rem; display: flex;
            align-items: center; justify-content: space-between; gap: 1.5rem;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; flex-shrink: 0;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: var(--radius-sm); display: flex;
            align-items: center; justify-content: center;
            font-size: 1.3rem; color: #000;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .logo-text {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            position: relative; flex: 1; max-width: 500px;
        }
        .search-box input {
            width: 100%; padding: 12px 20px 12px 48px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 100px; color: var(--text-primary);
            font-size: 0.95rem; font-family: inherit;
            transition: var(--transition); outline: none;
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .search-box i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
            font-size: 1rem;
        }

        /* VIEWS */
        #homeView { display: block; }
        #detailView { display: none; }

        /* MAIN */
        .main {
            max-width: 1400px; margin: 0 auto; padding: 2rem;
        }
        .section-header {
            display: flex; align-items: flex-end;
            justify-content: space-between; margin-bottom: 2rem;
            gap: 1rem; flex-wrap: wrap;
        }
        .section-title-group h1 {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem;
        }
        .section-title-group p { color: var(--text-secondary); font-size: 0.95rem; }
        .per-page {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .per-page select {
            background: var(--bg-secondary); border: 1px solid var(--border);
            color: var(--text-primary); padding: 8px 12px;
            border-radius: var(--radius-sm); font-family: inherit;
            cursor: pointer; outline: none; transition: var(--transition);
        }
        .per-page select:focus { border-color: var(--gold); }

        /* GAMES GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; min-height: 200px;
        }

        /* GAME CARD */
        .game-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: var(--transition);
            opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover), var(--shadow-gold);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-link { text-decoration: none; display: block; }
        .card-image {
            position: relative; width: 100%; aspect-ratio: 16/10;
            overflow: hidden; background: var(--bg-secondary);
        }
        .card-image img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .game-card:hover .card-image img { transform: scale(1.08); }
        .card-overlay {
            position: absolute; top: 12px; right: 12px;
        }
        .badge {
            background: rgba(255, 215, 0, 0.9); color: #000;
            padding: 4px 12px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .card-hover-icon {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0; transition: var(--transition);
        }
        .card-hover-icon i {
            width: 50px; height: 50px;
            background: var(--gold); color: #000;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.2rem; transform: scale(0.8);
            transition: var(--transition);
        }
        .game-card:hover .card-hover-icon { opacity: 1; }
        .game-card:hover .card-hover-icon i { transform: scale(1); }
        .card-content {
            padding: 1.25rem; display: flex;
            flex-direction: column; gap: 0.75rem;
        }
        .card-title-link { text-decoration: none; }
        .game-title {
            font-size: 1.1rem; font-weight: 700;
            color: var(--text-primary); line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 1;
            -webkit-box-orient: vertical; overflow: hidden;
            transition: var(--transition);
        }
        .card-title-link:hover .game-title { color: var(--gold); }
        .game-desc {
            font-size: 0.85rem; color: var(--text-secondary);
            line-height: 1.5; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; min-height: 2.5em;
        }
        .game-rating {
            display: flex; align-items: center; gap: 8px;
        }
        .stars { display: flex; gap: 3px; font-size: 0.85rem; }
        .stars.large { font-size: 1.1rem; gap: 4px; }
        .star-filled { color: var(--gold); }
        .star-empty { color: var(--border-hover); }
        .rating-text {
            font-size: 0.85rem; font-weight: 600; color: var(--gold);
        }
        .download-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%; padding: 12px; margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000; text-decoration: none;
            border-radius: var(--radius-sm); font-weight: 700;
            font-size: 0.9rem; transition: var(--transition);
            border: none; cursor: pointer;
        }
        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        .download-btn:active { transform: scale(0.98); }

        /* PAGINATION */
        .pagination-wrapper {
            display: flex; flex-direction: column;
            align-items: center; gap: 1rem;
            margin-top: 2.5rem; padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .pagination {
            display: flex; align-items: center;
            gap: 6px; flex-wrap: wrap; justify-content: center;
        }
        .page-btn {
            min-width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            font-family: inherit; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); padding: 0 12px;
        }
        .page-btn:hover:not(.disabled):not(.active) {
            border-color: var(--gold); color: var(--gold);
            background: var(--gold-transparent);
        }
        .page-btn.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-color: var(--gold); color: #000; font-weight: 700;
            box-shadow: 0 0 15px var(--gold-glow);
        }
        .page-btn.disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn.nav-btn { padding: 0 16px; }
        .page-dots {
            color: var(--text-muted); padding: 0 8px;
            font-weight: 700; user-select: none;
        }
        .page-info { color: var(--text-muted); font-size: 0.85rem; }

        /* DETAIL PAGE */
        .detail-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.9rem; margin-bottom: 1.5rem;
            transition: var(--transition); cursor: pointer;
            background: none; border: none; font-family: inherit;
        }
        .back-btn:hover { color: var(--gold); }
        .detail-hero {
            display: grid; grid-template-columns: 1fr 1.2fr;
            gap: 2.5rem; margin-bottom: 3rem;
        }
        .detail-image-wrapper {
            position: relative; border-radius: var(--radius);
            overflow: hidden; border: 1px solid var(--border);
        }
        .detail-image {
            width: 100%; aspect-ratio: 16/10; object-fit: cover;
            display: block;
        }
        .detail-badge {
            position: absolute; top: 16px; left: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000; padding: 6px 16px; border-radius: 100px;
            font-size: 0.8rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .detail-info { display: flex; flex-direction: column; gap: 1.25rem; }
        .detail-title {
            font-size: 2.2rem; font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--text-primary), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .detail-rating {
            display: flex; align-items: center; gap: 12px;
        }
        .rating-number {
            font-size: 1.3rem; font-weight: 700; color: var(--gold);
        }
        .rating-count { color: var(--text-muted); font-size: 0.9rem; }
        .detail-meta {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
        }
        .meta-item {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .meta-item i { color: var(--gold); font-size: 0.85rem; }
        .detail-description {
            color: var(--text-secondary); font-size: 1rem;
            line-height: 1.7;
        }
        .detail-actions {
            display: flex; gap: 12px; margin-top: 0.5rem;
        }
        .btn-download-large {
            flex: 1; display: flex; align-items: center; gap: 14px;
            padding: 16px 28px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000; text-decoration: none;
            border-radius: var(--radius-sm); font-weight: 700;
            transition: var(--transition); border: none; cursor: pointer;
        }
        .btn-download-large:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }
        .btn-download-large i { font-size: 1.5rem; }
        .btn-text { display: flex; flex-direction: column; }
        .btn-label { font-size: 1.1rem; font-weight: 800; }
        .btn-sublabel { font-size: 0.8rem; opacity: 0.7; font-weight: 500; }
        .btn-share {
            width: 56px; height: 56px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; cursor: pointer; transition: var(--transition);
        }
        .btn-share:hover {
            border-color: var(--gold); color: var(--gold);
            background: var(--gold-transparent);
        }

        /* DETAIL SECTIONS */
        .detail-section { margin-bottom: 3rem; }
        .section-heading {
            font-size: 1.3rem; font-weight: 700;
            margin-bottom: 1.5rem; display: flex;
            align-items: center; gap: 10px;
        }
        .section-heading i { color: var(--gold); }
        .about-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .about-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 1.5rem;
            text-align: center; transition: var(--transition);
        }
        .about-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
        }
        .about-card i {
            font-size: 1.5rem; color: var(--gold);
            margin-bottom: 0.75rem;
        }
        .about-label {
            display: block; color: var(--text-muted);
            font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px;
        }
        .about-value {
            display: block; color: var(--text-primary);
            font-size: 1.1rem; font-weight: 700;
        }

        /* RELATED GAMES */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
        }
        .related-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); overflow: hidden;
            text-decoration: none; transition: var(--transition);
            opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }
        .related-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
            transform: translateY(-4px);
        }
        .related-card img {
            width: 100%; aspect-ratio: 16/10; object-fit: cover;
            display: block;
        }
        .related-info { padding: 1rem; }
        .related-info h4 {
            color: var(--text-primary); font-size: 0.95rem;
            font-weight: 600; margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .related-rating {
            display: flex; align-items: center; gap: 6px;
            color: var(--gold); font-size: 0.85rem; font-weight: 600;
        }

        /* EMPTY STATE */
        .empty-state {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 5rem 2rem; text-align: center; gap: 1rem;
        }
        .empty-icon { font-size: 4rem; color: var(--border-hover); }
        .empty-state h3 { font-size: 1.3rem; color: var(--text-secondary); }
        .empty-state p { color: var(--text-muted); max-width: 400px; }

        /* FOOTER */
        .footer {
            text-align: center; padding: 2rem;
            color: var(--text-muted); font-size: 0.85rem;
            border-top: 1px solid var(--border); margin-top: 3rem;
        }

        /* RESPONSIVE */
        @media (max-width: 968px) {
            .detail-hero { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.8rem; }
        }
        @media (max-width: 768px) {
            .header-content { flex-wrap: wrap; padding: 1rem; }
            .search-box { order: 3; max-width: 100%; flex-basis: 100%; }
            .main, .detail-container { padding: 1.5rem 1rem; }
            .games-grid { grid-template-columns: 1fr; gap: 1rem; }
            .section-title-group h1 { font-size: 1.5rem; }
            .detail-meta { gap: 1rem; }
            .detail-actions { flex-direction: column; }
            .btn-share { width: 100%; height: 48px; }
            .related-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .logo-text { font-size: 1.2rem; }
            .card-content { padding: 1rem; }
            .detail-title { font-size: 1.5rem; }
            .about-grid { grid-template-columns: repeat(2, 1fr); }
            .related-grid { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 100px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader" class="loader-container">
        <div class="loader-spinner"></div>
        <div class="loader-text">Memuat Game...</div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo" onclick="window.location.hash=''; return false;">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <span class="logo-text">GameHub</span>
            </a>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari game...">
            </div>
        </div>
    </header>

    <!-- HOME VIEW -->
    <div id="homeView">
        <main class="main">
            <div class="section-header">
                <div class="section-title-group">
                    <h1>Game Terbaru</h1>
                    <p>Temukan dan download game favoritmu</p>
                </div>
                <div class="per-page">
                    <span>Tampilkan:</span>
                    <select id="perPage">
                        <option value="8" selected>8</option>
                        <option value="12">12</option>
                        <option value="16">16</option>
                        <option value="24">24</option>
                    </select>
                </div>
            </div>

            <div id="gamesGrid" class="games-grid"></div>

            <div id="emptyState" class="empty-state">
                <i class="fas fa-box-open empty-icon"></i>
                <h3>Belum ada game tersedia</h3>
                <p>Game akan muncul setelah data berhasil dimuat dari database.</p>
            </div>

            <div class="pagination-wrapper">
                <div id="pagination" class="pagination"></div>
                <div id="pageInfo" class="page-info"></div>
            </div>
        </main>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView">
        <div class="detail-container">
            <button id="backBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p> GameHub. Built with Firebase & Love.</p>
    </footer>

</body>
</html>
